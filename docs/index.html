<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open MicZH — An article</title>
    <meta
      name="description"
      content="An overview of recurring open mic comedy events in Zurich, with an embedded interactive map and some stats."
    />
    <link rel="stylesheet" href="./assets/fonts.css" />
    <style>
      :root {
        --color-bg: #ffffff;
        --color-bg-soft: #f4f4f4;
        --color-band: #f2f2f2;
        --color-ink: #0b0d10;
        --color-ink-body: #12161b;
        --color-muted: #55606a;
        --color-rule: #d6d6d6;
        --color-accent: #b5542a;
        --color-accent-hover: #944322;
        --color-accent-text: #7a3418;
        --color-accent-text-hover: #5c2712;

        --color-bg-glass: rgba(255, 255, 255, 0.96);
        --color-overlay: rgba(255, 255, 255, 0.82);
        --shadow-hairline: rgba(0, 0, 0, 0.06);

        --rule-w: 2px;
        --rule-strong-w: 4px;
        --underline-w: 2px;

        --font-display: "Spectral", "Georgia", serif;
        --font-ui: "Karla", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;

        --measure: 42rem;
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: var(--font-ui);
        line-height: 1.75;
        font-weight: 400;
        color: var(--color-ink-body);
        background: var(--color-bg);
        overflow-x: hidden;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: var(--color-ink);
        text-decoration: none;
        border-bottom: var(--underline-w) solid var(--color-rule);
        padding-bottom: 0.05em;
      }
      a:hover { color: var(--color-ink); border-bottom-color: var(--color-accent); }
      :focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

      .skip-link {
        position: absolute;
        left: 10px;
        top: 10px;
        padding: 8px 10px;
        background: var(--color-bg);
        border: var(--rule-w) solid var(--color-rule);
        color: var(--color-ink);
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        text-decoration: none;
        transform: translateY(-120%);
        transition: transform 0.15s ease;
        z-index: 200;
      }
      .skip-link:focus { transform: translateY(0); }

      .progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        width: 0%;
        background: var(--color-accent);
        z-index: 100;
        transition: width 0.1s;
      }

      .reveal{
        opacity:0;
        transform:translateY(24px);
        transition:opacity 0.7s ease, transform 0.7s ease;
      }
      .reveal.visible{
        opacity:1;
        transform:none;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 5vw;
      }
      .measure { max-width: var(--measure); }

      .hero {
        padding: 6rem 0 3.75rem;
        background: var(--color-bg);
      }
      .hero-tag {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        color: var(--color-muted);
        text-transform: uppercase;
        margin-bottom: 1rem;
      }
      .hero h1 {
        font-family: var(--font-display);
        font-size: clamp(2.6rem, 6.5vw, 5.25rem);
        font-weight: 700;
        line-height: 1.02;
        color: var(--color-ink);
        letter-spacing: -0.03em;
        margin: 0 0 1rem;
        max-width: 20ch;
      }
      .hero-sub {
        font-size: 1.125rem;
        color: var(--color-ink-body);
        max-width: 64ch;
        margin: 0 0 2rem;
        line-height: 1.7;
      }
      .hero-byline {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--color-muted);
        letter-spacing: 0.12em;
        display: flex;
        gap: 1.25rem;
        flex-wrap: wrap;
        text-transform: uppercase;
        align-items: baseline;
      }
      .hero-byline a {
        text-decoration: none;
        border-bottom: var(--underline-w) solid rgba(181, 84, 42, 0.55);
      }
      .hero-byline a:hover {
        border-bottom-color: rgba(148, 67, 34, 0.7);
      }

      section { padding: 5.25rem 0; }
      section:nth-child(even) { background: var(--color-bg-soft); }

      .section-label {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.22em;
        color: var(--color-muted);
        text-transform: uppercase;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-label::after {
        content: "";
        display: block;
        height: 1px;
        width: 40px;
        background: var(--color-rule);
      }
      .sec-head {
        display: flex;
        align-items: baseline;
        gap: 14px;
        padding-bottom: 0.75rem;
        border-bottom: var(--rule-w) solid var(--color-rule);
        margin-bottom: 1.5rem;
      }
      .sec-num {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.22em;
        color: var(--color-accent);
        text-transform: uppercase;
        flex: 0 0 auto;
      }
      h2 {
        font-family: var(--font-display);
        font-size: clamp(1.75rem, 3.2vw, 2.6rem);
        font-weight: 700;
        line-height: 1.2;
        color: var(--color-ink);
        margin: 0;
      }
      h3 {
        font-family: var(--font-display);
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--color-ink);
        margin: 2rem 0 0.75rem;
      }
      p {
        font-size: 1.0625rem;
        color: var(--color-ink-body);
        margin: 0 0 1.25rem;
        max-width: 70ch;
      }
      ul {
        margin: 0 0 1.5rem 1.25rem;
        padding: 0;
        max-width: 70ch;
        color: var(--color-ink-body);
      }
      li { margin-bottom: 0.5rem; }
      code { font-family: var(--font-mono); font-size: 0.95em; }

      .note-box {
        border-top: var(--rule-w) solid var(--color-rule);
        border-bottom: var(--rule-w) solid var(--color-rule);
        padding: 1rem 0;
        margin: 2rem 0;
        max-width: 70ch;
      }
      .note-box-label {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.22em;
        color: var(--color-accent);
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      .note-box p {
        font-size: 0.98rem;
        color: var(--color-muted);
        margin: 0;
        max-width: none;
      }
      .stats {
        border-top: var(--rule-w) solid var(--color-rule);
        border-bottom: var(--rule-w) solid var(--color-rule);
        padding: 1rem 0;
        margin: 2rem 0;
        max-width: 70ch;
      }
      .stats-label {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.22em;
        color: var(--color-accent);
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      .stats-cards {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 0.5rem;
        perspective: 900px;
      }
      .stat-card {
        width: 108px;
        height: 108px;
        border: var(--rule-w) solid var(--color-rule);
        background: var(--color-bg-soft);
        display: grid;
        grid-template-rows: 1fr auto;
        padding: 10px;
        position: relative;
      }
      .stat-card.flip {
        opacity: 0;
        transform: translateY(18px) rotateX(-18deg) rotateY(88deg);
        transform-style: preserve-3d;
        transform-origin: left center;
        will-change: transform, opacity;
      }
      .reveal.visible .stat-card.flip {
        animation: cardFlipIn 700ms cubic-bezier(0.2, 0.75, 0.25, 1) both;
      }
      @keyframes cardFlipIn {
        from {
          opacity: 0;
          transform: translateY(18px) rotateX(-18deg) rotateY(88deg);
        }
        55% {
          opacity: 1;
          transform: translateY(0) rotateX(0deg) rotateY(-8deg);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .stat-card .v {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 34px;
        line-height: 1;
        color: var(--color-ink);
        align-self: center;
      }
      .stat-card .flag {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 26px;
        height: 18px;
        border: 1px solid rgba(0,0,0,0.12);
        box-shadow: 0 1px 0 rgba(0,0,0,0.04);
        user-select: none;
        object-fit: cover;
      }
      .stat-card .k {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-muted);
        line-height: 1.25;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .stat-card.is-manual .k {
        white-space: pre-line;
      }
      .stat-card.is-loading {
        color: var(--color-muted);
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        display: grid;
        place-items: center;
      }
      .stat-card.is-alert {
        border-color: rgba(181, 84, 42, 0.55);
        background: rgba(181, 84, 42, 0.08);
      }
      .stat-card.is-alert .k {
        color: var(--color-accent);
      }

      .weekday-strip-hint {
        font-size: 0.9rem;
        color: var(--color-muted);
        margin: 0.15rem 0 0.35rem;
        max-width: 70ch;
      }
      .weekday-strip {
        display: flex;
        align-items: stretch;
        gap: 8px;
        margin-top: 0.35rem;
        min-height: 128px;
      }
      .weekday-col {
        flex: 1 1 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
      }
      .weekday-bar-track {
        width: 100%;
        flex: 1;
        min-height: 40px;
        background: rgba(0, 0, 0, 0.05);
        border: var(--rule-w) solid var(--color-rule);
        border-radius: 10px 10px 4px 4px;
        display: flex;
        align-items: flex-end;
        overflow: hidden;
      }
      .weekday-bar-fill {
        width: 100%;
        border-radius: 8px 8px 0 0;
        background: rgba(181, 84, 42, 0.38);
        min-height: 0;
        transition: height 0.35s ease;
      }
      .weekday-col.is-busiest .weekday-bar-fill {
        background: rgba(181, 84, 42, 0.82);
      }
      .weekday-abbr {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--color-muted);
        text-transform: uppercase;
        text-align: center;
      }
      .weekday-count {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.2rem;
        color: var(--color-ink);
        line-height: 1;
      }

      .embed-frame {
        width: 100%;
        /* Avoid clipping the embedded page's side gutters */
        overflow: visible;
        border: var(--rule-w) solid var(--color-rule);
        background: var(--color-bg);
      }
      .embed-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: transparent;
      }
      .wide-bleed {
        width: 100vw;
        margin-left: calc(50% - 50vw);
        margin-right: calc(50% - 50vw);
        padding-left: clamp(0.75rem, 3vw, 2rem);
        padding-right: clamp(0.75rem, 3vw, 2rem);
      }
      .wide-bleed .embed-frame,
      .wide-bleed .measure {
        /* Let the embedded map use its intended wide layout */
        max-width: 1440px;
        margin-left: auto;
        margin-right: auto;
      }

      .site-footer {
        padding: 18px 5vw 30px;
        color: var(--color-muted);
        font-size: 12px;
        font-family: var(--font-mono);
        border-top: var(--rule-w) solid var(--color-ink);
        text-align: center;
      }

      @media (prefers-reduced-motion: reduce){
        html{ scroll-behavior:auto; }
        .reveal{ opacity:1; transform:none; transition:none; }
        .progress-bar{ transition:none; }
        .stat-card.flip{ opacity:1; transform:none; animation:none; }
        .weekday-bar-fill { transition: none; }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <div class="progress-bar" id="progress"></div>

    <header class="hero" aria-label="Open MicZH article hero" data-src="./content/article.md" data-part="hero"></header>

    <main id="content" data-src="./content/article.md" data-part="body"></main>

    <footer class="site-footer reveal">
      Open MicZH · Article page · <a href="./map.html">Map / interactive</a>
    </footer>

    <script>
      window.__contentReady = (async function () {
        const nodes = Array.from(document.querySelectorAll("[data-src]"));
        if (!nodes.length) return;

        function escapeHtml(s) {
          return String(s || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function renderInlineMarkdown(s) {
          let out = escapeHtml(s);
          out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_m, t, url) => `<a href="${escapeHtml(url)}">${escapeHtml(t)}</a>`);
          out = out.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
          out = out.replace(/\*([^*]+)\*/g, "<em>$1</em>");
          return out;
        }

        // Minimal markdown renderer (enough for our article copy).
        // - Supports headings, paragraphs, unordered lists, and raw HTML blocks.
        function mdToHtml(md) {
          const lines = String(md || "").replace(/\r\n?/g, "\n").split("\n");
          const out = [];
          let inUl = false;

          function closeUl() {
            if (inUl) {
              out.push("</ul>");
              inUl = false;
            }
          }

          for (let i = 0; i < lines.length; i++) {
            const raw = lines[i];
            const line = raw.trimEnd();
            const t = line.trim();

            if (!t) {
              closeUl();
              continue;
            }

            // Raw HTML lines: pass through, but keep parsing markdown between tags.
            // This lets us embed structural wrappers (<section>, <div>, etc.) and still write copy in markdown.
            if (t.startsWith("<")) {
              closeUl();
              out.push(raw);
              continue;
            }

            const h3 = t.match(/^###\s+(.*)$/);
            if (h3) {
              closeUl();
              out.push(`<h3 class="reveal">${renderInlineMarkdown(h3[1])}</h3>`);
              continue;
            }
            const h2 = t.match(/^##\s+(.*)$/);
            if (h2) {
              closeUl();
              out.push(`<h2 class="reveal">${renderInlineMarkdown(h2[1])}</h2>`);
              continue;
            }

            const li = t.match(/^- (.*)$/);
            if (li) {
              if (!inUl) {
                out.push('<ul class="reveal">');
                inUl = true;
              }
              out.push(`<li>${renderInlineMarkdown(li[1])}</li>`);
              continue;
            }

            closeUl();
            out.push(`<p class="reveal">${renderInlineMarkdown(t)}</p>`);
          }
          closeUl();
          return out.join("\n");
        }

        function splitParts(md) {
          const text = String(md || "").replace(/\r\n?/g, "\n");
          const re = /^<!--PART:([a-zA-Z0-9_-]+)-->\s*$/gm;
          const matches = Array.from(text.matchAll(re));
          if (!matches.length) return null;
          const parts = {};
          for (let i = 0; i < matches.length; i++) {
            const key = matches[i][1];
            const start = matches[i].index + matches[i][0].length;
            const end = (i + 1 < matches.length) ? matches[i + 1].index : text.length;
            parts[key] = text.slice(start, end).trim();
          }
          return parts;
        }

        async function fetchTextCached(cache, src) {
          if (cache.has(src)) return cache.get(src);
          const p = (async () => {
            const r = await fetch(src, { cache: "no-cache" });
            if (!r.ok) throw new Error("Failed to load: " + src);
            return await r.text();
          })();
          cache.set(src, p);
          return p;
        }

        async function loadInto(node, cache) {
          const src = node.getAttribute("data-src");
          if (!src) return;
          const part = (node.getAttribute("data-part") || "").trim();
          const txt = await fetchTextCached(cache, src);
          if (src.toLowerCase().endsWith(".md")) {
            const parts = splitParts(txt);
            const chunk = (parts && part && Object.prototype.hasOwnProperty.call(parts, part)) ? parts[part] : txt;
            node.innerHTML = mdToHtml(chunk);
          } else {
            node.innerHTML = txt;
          }
        }

        try {
          const cache = new Map();
          for (const node of nodes) {
            await loadInto(node, cache);
          }
        } catch (e) {
          console.error(e);
          const main = document.getElementById("content");
          if (main) {
            main.innerHTML =
              "<section><div class='container'><div class='note-box'>" +
              "<div class='note-box-label'>Note</div>" +
              "<p>Could not load the article body. Try opening <a href='./content/article.md'>article.md</a>.</p>" +
              "</div></div></section>";
          }
        }
      })();
    </script>
    <script>
      (async function () {
        await (window.__contentReady || Promise.resolve());
        const progress = document.getElementById("progress");
        if (!progress) return;
        function tick() {
          const h = document.documentElement;
          const sh = h.scrollHeight - h.clientHeight;
          const pct = sh > 0 ? (h.scrollTop / sh) * 100 : 0;
          progress.style.width = pct + "%";
        }
        window.addEventListener("scroll", tick, { passive: true });
        window.addEventListener("resize", tick);
        tick();
      })();
    </script>
    <script>
      (async function () {
        await (window.__contentReady || Promise.resolve());
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add("visible");
                observer.unobserve(e.target);
              }
            });
          },
          { threshold: 0.12 }
        );
        document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
      })();
    </script>
    <script>
      (async function () {
        await (window.__contentReady || Promise.resolve());
        const cards = document.getElementById("langStatsCards");
        if (!cards) return;
        const manualCards = document.getElementById("manualStatsCards");
        const weekdayWrap = document.getElementById("weekdayStatsInner");

        function eventKey(e) {
          const url = (e && e.url) ? String(e.url).trim() : "";
          if (url) return "url:" + url;
          const parts = [
            (e && e.title) ? String(e.title).trim().toLowerCase() : "",
            (e && e.venue) ? String(e.venue).trim().toLowerCase() : "",
            (e && e.weekday) ? String(e.weekday).trim().toLowerCase() : "",
            (e && e.time) ? String(e.time).trim().toLowerCase() : "",
          ];
          return "tvtwt:" + parts.join("|");
        }

        function mergeEvents(primary, extra) {
          const out = [];
          const seen = new Set();
          function addAll(list) {
            for (const e of (list || [])) {
              if (!e) continue;
              const k = eventKey(e);
              if (seen.has(k)) continue;
              seen.add(k);
              out.push(e);
            }
          }
          addAll(primary);
          addAll(extra);
          return out;
        }

        function langFlagSrc(lang) {
          const s = (lang || "").toString().trim().toLowerCase();
          if (!s) return "";

          // Minimal inline SVG flags (data URLs). Keeps the site self-contained.
          const SVG = {
            ch:
              "data:image/svg+xml;utf8," +
              encodeURIComponent(

                  "<rect x='7.25' y='2.2' width='3.5' height='7.6' fill='#fff'/>" +
                  "<rect x='5.0' y='4.25' width='8.0' height='3.5' fill='#fff'/>" +
                "</svg>"
              ),
            gb:
              "data:image/svg+xml;utf8," +
              encodeURIComponent(
                "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 18 12'>" +
                  "<rect width='18' height='12' fill='#012169'/>" +
                  "<path d='M0 0 L18 12 M18 0 L0 12' stroke='#fff' stroke-width='2.4'/>" +
                  "<path d='M0 0 L18 12 M18 0 L0 12' stroke='#C8102E' stroke-width='1.2'/>" +
                  "<rect x='7.4' width='3.2' height='12' fill='#fff'/>" +
                  "<rect y='4.4' width='18' height='3.2' fill='#fff'/>" +
                  "<rect x='8.0' width='2.0' height='12' fill='#C8102E'/>" +
                  "<rect y='5.0' width='18' height='2.0' fill='#C8102E'/>" +
                "</svg>"
              ),
            es:
              "data:image/svg+xml;utf8," +
              encodeURIComponent(
                "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 18 12'>" +
                  "<rect width='18' height='12' fill='#aa151b'/>" +
                  "<rect y='3' width='18' height='6' fill='#f1bf00'/>" +
                "</svg>"
              ),
            fr:
              "data:image/svg+xml;utf8," +
              encodeURIComponent(
                "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 18 12'>" +
                  "<rect width='6' height='12' x='0' fill='#0055a4'/>" +
                  "<rect width='6' height='12' x='6' fill='#fff'/>" +
                  "<rect width='6' height='12' x='12' fill='#ef4135'/>" +
                "</svg>"
              ),
            it:
              "data:image/svg+xml;utf8," +
              encodeURIComponent(
                "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 18 12'>" +
                  "<rect width='6' height='12' x='0' fill='#009246'/>" +
                  "<rect width='6' height='12' x='6' fill='#fff'/>" +
                  "<rect width='6' height='12' x='12' fill='#ce2b37'/>" +
                "</svg>"
              ),
          };

          // German shows are in Zürich → Swiss flag.
          if (s === "german" || s === "de" || s.startsWith("german ")) return SVG.ch;
          if (s === "english" || s === "en" || s.startsWith("english ")) return SVG.gb;
          if (s === "spanish" || s === "es" || s.startsWith("spanish ")) return SVG.es;
          if (s === "french" || s === "fr" || s.startsWith("french ")) return SVG.fr;
          if (s === "italian" || s === "it" || s.startsWith("italian ")) return SVG.it;
          return "";
        }

        function pushManualCard(container, { n, label, isAlert, isManual } = {}) {
          if (!container) return;
          const card = document.createElement("div");
          card.className =
            "stat-card flip" +
            (isAlert ? " is-alert" : "") +
            (isManual ? " is-manual" : "");

          const v = document.createElement("div");
          v.className = "v";
          v.textContent = String(n);

          const k = document.createElement("div");
          k.className = "k";
          k.textContent = label || "";

          card.appendChild(v);
          card.appendChild(k);
          container.appendChild(card);
        }

        try {
          const r1 = await fetch("./data/events.json", { cache: "no-cache" });
          const p1 = await r1.json();
          const primary = (p1 && p1.events) ? p1.events : [];

          let venuesManualMeta = null;
          try {
            const rV = await fetch("./data/venues_manual.json", { cache: "no-cache" });
            if (rV.ok) {
              venuesManualMeta = await rV.json();
            }
          } catch (e) {}

          let venuesPayload = null;
          try {
            const rVen = await fetch("./data/venues.json", { cache: "no-cache" });
            if (rVen.ok) {
              venuesPayload = await rVen.json();
            }
          } catch (e) {}

          const events = mergeEvents(primary, []);

          const dataTag =
            (venuesManualMeta && typeof venuesManualMeta.data_tag === "string" && venuesManualMeta.data_tag.trim())
              ? venuesManualMeta.data_tag.trim().toLowerCase()
              : "";
          const dataTagNote =
            (venuesManualMeta && typeof venuesManualMeta.data_tag_note === "string" && venuesManualMeta.data_tag_note.trim())
              ? venuesManualMeta.data_tag_note.trim()
              : ((p1 && typeof p1.data_tag_note === "string" && p1.data_tag_note.trim()) ? p1.data_tag_note.trim() : "");

          // Manual stats: address/location fixes from venues_manual vs venues that had no override.
          if (manualCards) {
            manualCards.innerHTML = "";

            const um = venuesManualMeta && typeof venuesManualMeta === "object" ? venuesManualMeta : {};
            const vvenues = um.venues && typeof um.venues === "object" ? um.venues : {};

            const venueList = (venuesPayload && Array.isArray(venuesPayload.venues)) ? venuesPayload.venues : [];
            const venueIdSet = new Set(
              venueList.map((v) => (v && v.venue_id ? String(v.venue_id).trim() : "")).filter(Boolean)
            );

            let addressFixCount = 0;
            const touchedVenueIds = new Set();
            for (const [vid, patch] of Object.entries(vvenues)) {
              if (!vid || !String(vid).startsWith("v_")) continue;
              if (!patch || typeof patch !== "object") continue;
              if (!venueIdSet.has(vid)) continue;
              const pkeys = Object.keys(patch).filter((k) => !String(k).startsWith("_"));
              if (!pkeys.length) continue;
              if (pkeys.length === 1 && pkeys[0] === "merge_into") continue;
              touchedVenueIds.add(vid);
              if (Object.prototype.hasOwnProperty.call(patch, "address") || Object.prototype.hasOwnProperty.call(patch, "location_display")) {
                addressFixCount += 1;
              }
            }

            const totalVenues = venueList.length;
            const fineVenues = totalVenues > 0 ? Math.max(0, totalVenues - touchedVenueIds.size) : 0;

            pushManualCard(manualCards, {
              n: addressFixCount,
              label: "Address\nfixes",
              isAlert: dataTag === "incomplete" || dataTag === "stale",
              isManual: true,
            });
            pushManualCard(manualCards, {
              n: fineVenues,
              label: totalVenues > 0 ? "Venues\nfine" : "Venues\nfine (n/a)",
              isManual: true,
            });

            if (dataTagNote) {
              const note = document.createElement("p");
              note.className = "stats-note";
              note.style.cssText = "grid-column: 1 / -1; margin: 0.6rem 0 0; font-size: 0.9rem; color: var(--color-muted);";
              note.textContent = dataTagNote;
              manualCards.appendChild(note);
            }
          }

          const counts = new Map();
          for (const e of events) {
            const raw = (e && e.language) ? String(e.language) : "";
            const parts = raw.split(/[;,]/).map(s => s.trim()).filter(Boolean);
            const langs = parts.length ? parts : ["Unspecified"];
            for (const lang of langs) {
              counts.set(lang, (counts.get(lang) || 0) + 1);
            }
          }

          const rows = Array.from(counts.entries())
            .sort((a, b) => (b[1] - a[1]) || a[0].localeCompare(b[0]));

          cards.innerHTML = "";

          for (let i = 0; i < rows.length; i++) {
            const [lang, n] = rows[i];
            const card = document.createElement("div");
            card.className = "stat-card flip";
            // small stagger so it feels like a deck
            card.style.animationDelay = (70 * i) + "ms";

            const flagSrc = langFlagSrc(lang);
            if (flagSrc) {
              const img = document.createElement("img");
              img.className = "flag";
              img.alt = "";
              img.decoding = "async";
              img.loading = "lazy";
              img.src = flagSrc;
              card.appendChild(img);
            }

            const v = document.createElement("div");
            v.className = "v";
            v.textContent = String(n);

            const k = document.createElement("div");
            k.className = "k";
            k.textContent = lang;

            card.appendChild(v);
            card.appendChild(k);
            cards.appendChild(card);
          }

          if (weekdayWrap) {
            const WEEKDAYS = [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday",
              "Saturday",
              "Sunday",
            ];
            const WDAY_LOWER = new Map(WEEKDAYS.map((d) => [d.toLowerCase(), d]));
            function normWeekdayToken(s) {
              const t = String(s || "")
                .trim()
                .replace(/\.$/, "");
              if (!t) return "";
              return WDAY_LOWER.get(t.toLowerCase()) || "";
            }
            const dayCounts = new Map(WEEKDAYS.map((d) => [d, 0]));
            for (const e of events) {
              const raw = (e && e.weekday) ? String(e.weekday) : "";
              const parts = raw
                .split(/[,;/]/)
                .map((x) => x.trim())
                .filter(Boolean);
              const toks = parts.length ? parts : [];
              for (const tok of toks) {
                const d = normWeekdayToken(tok);
                if (d) dayCounts.set(d, (dayCounts.get(d) || 0) + 1);
              }
            }
            const peak = Math.max(0, ...WEEKDAYS.map((d) => dayCounts.get(d) || 0));
            const maxScale = Math.max(1, peak);

            weekdayWrap.innerHTML = "";
            const strip = document.createElement("div");
            strip.className = "weekday-strip";
            strip.setAttribute("role", "group");
            strip.setAttribute("aria-label", "Recurring shows counted per weekday");

            for (const d of WEEKDAYS) {
              const n = dayCounts.get(d) || 0;
              const col = document.createElement("div");
              col.className = "weekday-col" + (peak > 0 && n === peak ? " is-busiest" : "");
              const pct = peak > 0 ? (n / maxScale) * 100 : 0;

              const track = document.createElement("div");
              track.className = "weekday-bar-track";
              const fill = document.createElement("div");
              fill.className = "weekday-bar-fill";
              fill.style.height = pct + "%";
              fill.title = d + ": " + n + (n === 1 ? " show" : " shows");
              track.appendChild(fill);

              const abbr = document.createElement("div");
              abbr.className = "weekday-abbr";
              abbr.textContent = d.slice(0, 3);

              const num = document.createElement("div");
              num.className = "weekday-count";
              num.textContent = String(n);

              col.appendChild(track);
              col.appendChild(abbr);
              col.appendChild(num);
              strip.appendChild(col);
            }
            weekdayWrap.appendChild(strip);
          }
        } catch (e) {
          cards.innerHTML = "";
          const card = document.createElement("div");
          card.className = "stat-card is-loading";
          card.textContent = "Couldn’t load stats.";
          cards.appendChild(card);
          if (weekdayWrap) {
            weekdayWrap.innerHTML = "";
            const w = document.createElement("div");
            w.className = "stat-card is-loading";
            w.style.cssText = "width:100%;max-width:100%;height:auto;min-height:72px;";
            w.textContent = "Couldn’t load stats.";
            weekdayWrap.appendChild(w);
          }
        }
      })();
    </script>
  </body>
</html>
