<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Mics Zurich</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg: #0b0c10;
        --panel: #12141b;
        --text: #e9eefb;
        --muted: #a8b2c7;
        --border: rgba(255,255,255,0.12);
        --accent: #4da3ff;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(18,20,27,0.98), rgba(11,12,16,0.98));
        position: sticky;
        top: 0;
        z-index: 10;
      }
      header h1 {
        font-size: 16px;
        margin: 0 0 6px 0;
        letter-spacing: 0.2px;
      }
      header .sub {
        color: var(--muted);
        font-size: 12px;
      }
      .layout {
        display: grid;
        grid-template-columns: 1.35fr 0.85fr;
        gap: 12px;
        padding: 12px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        min-height: 200px;
      }
      #map {
        height: calc(100vh - 140px);
        min-height: 520px;
      }
      .banner {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.74);
        color: var(--text);
        font-size: 12px;
        border-bottom: 1px solid rgba(255,255,255,0.18);
        z-index: 5;
        backdrop-filter: blur(6px);
      }
      .banner code {
        color: var(--text);
      }
      .controls {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .controls label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .controls select, .controls input {
        width: 100%;
        padding: 10px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        outline: none;
      }
      .controls option {
        background: #0f1117;
        color: var(--text);
      }
      .list {
        padding: 8px 12px 12px 12px;
        height: calc(100vh - 140px);
        min-height: 520px;
        overflow: auto;
      }
      .item {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .item.active {
        background: rgba(77, 163, 255, 0.12);
        border-bottom-color: rgba(77, 163, 255, 0.35);
      }
      .item.active a {
        color: var(--accent);
      }
      .item a {
        color: var(--text);
        text-decoration: none;
      }
      .item a:hover {
        text-decoration: underline;
        color: var(--accent);
      }
      .meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
        line-height: 1.35;
      }
      .pill {
        display: inline-block;
        font-size: 11px;
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 999px;
        padding: 2px 8px;
        color: var(--muted);
        margin-right: 6px;
        margin-top: 6px;
      }
      .footer-note {
        padding: 10px 12px;
        color: var(--muted);
        font-size: 12px;
        border-top: 1px solid var(--border);
      }
      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }
        #map, .list {
          height: 520px;
          min-height: 520px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Open Mics Zurich</h1>
      <div class="sub">Filter by weekday and explore locations on the map. Data comes from <code>data/processed/events_flat.csv</code>.</div>
    </header>

    <div class="layout">
      <div class="card">
        <div style="position: relative;">
          <div class="banner" id="banner" style="display:none;"></div>
          <div id="map"></div>
        </div>
        <div class="footer-note" id="mapNote"></div>
      </div>

      <div class="card">
        <div class="controls">
          <div>
            <label for="weekday">Weekday</label>
            <select id="weekday">
              <option value="__all__">All</option>
              <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option><option value="Saturday">Saturday</option><option value="Sunday">Sunday</option>
            </select>
          </div>
          <div>
            <label for="q">Search</label>
            <input id="q" placeholder="title or location" />
          </div>
        </div>
        <div class="list">
          <div class="meta" id="count"></div>
          <div id="items"></div>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      let gmap = null;
      let gInfoWindow = null;
      let gMarkers = [];

      let lmap = null;
      let lMarkersLayer = null;

      let _lastActiveId = null;

      function norm(s) {
        return (s || '').toString().trim().toLowerCase();
      }

      function weekdayMatches(cell, selected) {
        if (!selected || selected === '__all__') return true;
        const parts = (cell || '').split(',').map(x => x.trim()).filter(Boolean);
        return parts.includes(selected);
      }

      function setActive(eventId) {
        if (_lastActiveId) {
          const prev = document.getElementById(_lastActiveId);
          if (prev) prev.classList.remove('active');
        }
        _lastActiveId = eventId;
        const el = document.getElementById(eventId);
        if (el) {
          el.classList.add('active');
          el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }

      function clearMarkers() {
        for (const m of gMarkers) {
          m.setMap(null);
        }
        gMarkers = [];
        if (lMarkersLayer) {
          lMarkersLayer.clearLayers();
        }
      }

      function render(events) {
        const weekday = document.getElementById('weekday').value;
        const q = norm(document.getElementById('q').value);

        const filtered = events.filter(e => {
          if (!weekdayMatches(e.weekday, weekday)) return false;
          if (q) {
            const hay = norm(e.title) + ' ' + norm(e.location);
            if (!hay.includes(q)) return false;
          }
          return true;
        });

        document.getElementById('count').textContent = `${filtered.length} event(s)`;

        const items = document.getElementById('items');
        items.innerHTML = '';
        clearMarkers();

        for (let idx = 0; idx < filtered.length; idx++) {
          const e = filtered[idx];
          const eventId = `event-${idx}`;
          const div = document.createElement('div');
          div.className = 'item';
          div.id = eventId;

          const a = document.createElement('a');
          a.href = e.url || '#';
          a.target = '_blank';
          a.rel = 'noreferrer';
          a.textContent = e.title || '(untitled)';
          div.appendChild(a);

          const meta = document.createElement('div');
          meta.className = 'meta';
          const left = [e.weekday, e.time, e.location].filter(Boolean).join(' · ');
          meta.textContent = left;
          div.appendChild(meta);

          const pills = document.createElement('div');
          for (const p of [e.language, e.regularity, e.cost].filter(Boolean)) {
            const s = document.createElement('span');
            s.className = 'pill';
            s.textContent = p;
            pills.appendChild(s);
          }
          div.appendChild(pills);

          items.appendChild(div);

          if (typeof e.lat === 'number' && typeof e.lon === 'number') {
            if (gmap) {
              const m = new google.maps.Marker({
                position: { lat: e.lat, lng: e.lon },
                map: gmap,
                title: e.title || '(untitled)',
              });
              const safe = (s) => (s || '').toString().replaceAll('<','&lt;');
              const popup = `<strong>${safe(e.title)}</strong><br/>` +
                            `${safe(e.weekday)} ${safe(e.time)}<br/>` +
                            `${safe(e.location)}<br/>` +
                            (e.url ? `<a href="${e.url}" target="_blank" rel="noreferrer">Open link</a><br/>` : '') +
                            (e.location ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.location)}" target="_blank" rel="noreferrer">Open in Google Maps</a>` : '');
              m.addListener('click', () => {
                setActive(eventId);
                if (!gInfoWindow) gInfoWindow = new google.maps.InfoWindow();
                gInfoWindow.setContent(popup);
                gInfoWindow.open({ anchor: m, map: gmap });
              });
              gMarkers.push(m);
            } else if (lmap && lMarkersLayer) {
              const safe = (s) => (s || '').toString().replaceAll('<','&lt;');
              const popup = `<strong>${safe(e.title)}</strong><br/>` +
                            `${safe(e.weekday)} ${safe(e.time)}<br/>` +
                            `${safe(e.location)}<br/>` +
                            (e.url ? `<a href="${e.url}" target="_blank" rel="noreferrer">Open link</a><br/>` : '') +
                            (e.location ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.location)}" target="_blank" rel="noreferrer">Open in Google Maps</a>` : '');
              const marker = L.marker([e.lat, e.lon]);
              marker.bindPopup(popup);
              marker.on('click', () => setActive(eventId));
              marker.addTo(lMarkersLayer);
            }
          }
        }

        const pinned = filtered.filter(e => typeof e.lat === 'number' && typeof e.lon === 'number').length;
        document.getElementById('mapNote').textContent =
          `Pins: ${pinned} / ${filtered.length} (run build-time geocoding to increase coverage).`;
      }

      function getGoogleMapsKey() {
        const params = new URLSearchParams(window.location.search);
        const fromQuery = params.get('gmaps_key');
        if (fromQuery) return fromQuery;
        try {
          return window.localStorage.getItem('open_mics_gmaps_key') || '';
        } catch (e) {
          return '';
        }
      }

      function showBanner(html) {
        const b = document.getElementById('banner');
        b.style.display = 'block';
        b.innerHTML = html;
      }

      async function boot() {
        const resp = await fetch('./data/events.json', { cache: 'no-cache' });
        const payload = await resp.json();
        const events = payload.events || [];

        const key = getGoogleMapsKey();
        if (!key) {
          // OSM fallback map
          lmap = L.map('map', { zoomControl: true }).setView([47.3769, 8.5417], 12);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
          }).addTo(lmap);
          lMarkersLayer = L.layerGroup().addTo(lmap);

          showBanner(
            `Using OpenStreetMap (no Google key). To enable Google basemap add <code>?gmaps_key=YOUR_KEY</code> ` +
            `or set <code>localStorage.setItem('open_mics_gmaps_key','YOUR_KEY')</code>.`
          );
          document.getElementById('weekday').addEventListener('change', () => render(events));
          document.getElementById('q').addEventListener('input', () => render(events));
          render(events);
          return;
        }

        // Load Google Maps JS API dynamically.
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&v=weekly`;
          s.async = true;
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });

        gmap = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 47.3769, lng: 8.5417 },
          zoom: 12,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: true,
        });

        document.getElementById('weekday').addEventListener('change', () => render(events));
        document.getElementById('q').addEventListener('input', () => render(events));
        render(events);
      }

      boot().catch(err => {
        document.getElementById('mapNote').textContent = 'Failed to load data/events.json';
        console.error(err);
      });
    </script>
  </body>
</html>
